socialspy:
  enabled: "{prefix}&dSocialSpy &lactivado&r&d."
  disabled: "{prefix}&7SocialSpy &ldesactivado&r&7."
  format: "{prefix}&8[&dSpy&8] &7{from} &8→ &7{to}&8: &d{message}"

commandspy:
  enabled: "{prefix}&6CommandSpy &lactivado&r&6."
  disabled: "{prefix}&7CommandSpy &ldesactivado&r&7."
