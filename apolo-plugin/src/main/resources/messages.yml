  teleporting: "{prefix}&7Teletransportando..."
  usage: "{prefix}&cUso: &e/tpa <jugador>"

tphere:
  request-sent: "{prefix}&7Invitaste a &e{player} &7a teletransportarse a tu ubicación."
  request-received: "{prefix}&e{player} &7te invita a teletransportarte a su ubicación. &a[Aceptar] &c[Rechazar]"
  accepted-sender: "{prefix}&a{player} &7aceptó tu invitación y se teletransportó a ti."
  accepted-target: "{prefix}&7Aceptaste la invitación de &a{player} &7y te teletransportaste a él."
